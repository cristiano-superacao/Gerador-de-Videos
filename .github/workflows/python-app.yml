name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Run pytest
      run: |
        python -m pytest tests -q
    - name: External API smoke (optional)
      env:
        RUN_EXTERNAL_API_SMOKE: ${{ secrets.RUN_EXTERNAL_API_SMOKE }}
        EXTERNAL_API_SMOKE_ALLOW_SHOTSTACK_RENDER: ${{ secrets.EXTERNAL_API_SMOKE_ALLOW_SHOTSTACK_RENDER }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        SHOTSTACK_API_KEY: ${{ secrets.SHOTSTACK_API_KEY }}
        SHOTSTACK_OWNER_ID: ${{ secrets.SHOTSTACK_OWNER_ID }}
      run: |
        python scripts/external_api_smoke.py

  e2e-tests:

    runs-on: ubuntu-latest
    needs: python-tests

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Set up Node 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Install Node dependencies
      run: |
        npm ci
    - name: Install Playwright browser
      run: |
        npx playwright install --with-deps chromium
    - name: Run Playwright E2E
      run: |
        npm run test:e2e
