name: Railway Production Validation

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-production:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
      PLAYWRIGHT_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Check production base URL
      id: production-url
      shell: bash
      run: |
        if [ -z "$APP_BASE_URL" ]; then
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "PRODUCTION_BASE_URL ausente. A validacao publica sera ignorada."
          exit 0
        fi

        echo "enabled=true" >> "$GITHUB_OUTPUT"

    - name: Set up Python 3.12
      if: steps.production-url.outputs.enabled == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up Node.js
      if: steps.production-url.outputs.enabled == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install Python dependencies
      if: steps.production-url.outputs.enabled == 'true'
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

    - name: Install Node dependencies
      if: steps.production-url.outputs.enabled == 'true'
      run: |
        npm ci

    - name: Install Playwright browser
      if: steps.production-url.outputs.enabled == 'true'
      run: |
        npx playwright install --with-deps chromium

    - name: Run public smoke test
      if: steps.production-url.outputs.enabled == 'true'
      run: |
        python scripts/client_smoke_test.py

    - name: Run Playwright E2E against production
      if: steps.production-url.outputs.enabled == 'true'
      run: |
        npm run test:e2e

    - name: Run Playwright mobile against production
      if: steps.production-url.outputs.enabled == 'true'
      run: |
        npm run test:e2e:mobile