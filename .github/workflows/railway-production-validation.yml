name: Railway Production Validation

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate-production:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check Railway token
      id: railway-token
      shell: pwsh
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:RAILWAY_TOKEN)) {
          "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Output "RAILWAY_TOKEN ausente. A validacao publica sera ignorada."
          exit 0
        }

        "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Set up Python 3.12
      if: steps.railway-token.outputs.enabled == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up Node 20
      if: steps.railway-token.outputs.enabled == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install Python dependencies
      if: steps.railway-token.outputs.enabled == 'true'
      run: |
        python -m pip install --upgrade pip
        if (Test-Path requirements.txt) { python -m pip install -r requirements.txt }

    - name: Install Node dependencies
      if: steps.railway-token.outputs.enabled == 'true'
      run: |
        npm ci

    - name: Install Playwright browser
      if: steps.railway-token.outputs.enabled == 'true'
      run: |
        npx playwright install chromium

    - name: Install Railway CLI
      if: steps.railway-token.outputs.enabled == 'true'
      run: |
        npm install -g @railway/cli

    - name: Link Railway project
      if: steps.railway-token.outputs.enabled == 'true'
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        railway link -p 9e74ed03-af41-40d0-91a4-db125361f948 -e production -s api

    - name: Run full Railway validation
      if: steps.railway-token.outputs.enabled == 'true'
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        powershell -ExecutionPolicy Bypass -File .\scripts\railway_full_validation.ps1